<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ExpensIA</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <main class="shell">
      <header class="top">
        <div class="brand-lockup">
          <span class="logo-mark" aria-hidden="true">
            <img src="assets/Logo (icon) 32.png" alt="" />
          </span>
          <div>
            <div class="brand">ExpensIA</div>
            <div class="brand-note">Gastos</div>
          </div>
        </div>
        <button id="openSettings" class="icon-btn" aria-label="Abrir configuración" title="Ajustes">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
            <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 0 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.3 7A2 2 0 0 1 7.1 4.2l.1.1a1.7 1.7 0 0 0 1.9.3h.1a1.7 1.7 0 0 0 .9-1.6V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 0 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9v.1a1.7 1.7 0 0 0 1.6.9h.1a2 2 0 0 1 0 4H21a1.7 1.7 0 0 0-1.6 1Z"></path>
          </svg>
        </button>
      </header>

      <section class="card account-card">
        <div class="label">Cuenta</div>
        <div class="status user-line" id="userLine"></div>
        <div class="row">
          <button id="signInBtn">Iniciar sesión</button>
          <button id="signOutBtn" disabled>Cerrar sesión</button>
        </div>
      </section>

      <section class="card sync-card">
        <div class="label">Sincronizar</div>
        <button id="syncBtn" class="primary" disabled>Sincronizar gastos</button>

        <div class="sync-filter">
          <label class="range-toggle" for="useDateRange">
            <input id="useDateRange" type="checkbox" />
            <span class="range-title">Usar fechas específicas</span>
          </label>
          <div id="dateRangeFields" class="date-range-fields hidden">
            <label class="date-field">
              <span>Desde</span>
              <input id="startDate" type="date" />
            </label>
            <label class="date-field">
              <span>Hasta</span>
              <input id="endDate" type="date" />
            </label>
          </div>
        </div>

        <div class="sync-state">
          <div class="sync-feedback">
            <span id="syncIndicator" class="sync-indicator" aria-hidden="true"></span>
            <div class="status" id="status"></div>
          </div>
          <div id="processLog" class="process-log"></div>
        </div>

        <button id="openReview" class="secondary" disabled>Abrir revisión</button>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
